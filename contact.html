<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sin the Kin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=contact-minimal-1">
</head>

<body>
    <header class="site-header">
        <a href="index.html" class="logo-mark">Logo</a>
        <nav class="top-nav" aria-label="Primary navigation">
            <a href="index.html">Home</a>
            <a href="prints.html">Prints</a>
            <a href="originals.html">Original Work</a>
            <a href="meet-sin.html">Meet Sin</a>
            <a href="info.html">Info</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
        <a class="utility-link" href="contact.html">Inquire</a>
    </header>

    <main>
        <section class="page-header contact-page-header">
            <div>
                <h1>Contact</h1>
            </div>
        </section>

        <section class="section contact-section">
            <form class="contact-form" action="mailto:sinthekin@proton.me" method="post" enctype="text/plain">
                <label>
                    <span>Full Name</span>
                    <input type="text" name="Full Name" autocomplete="name">
                </label>
                <label>
                    <span>Email*</span>
                    <input type="email" name="Email" autocomplete="email" required>
                </label>
                <label>
                    <span>Message*</span>
                    <textarea name="Message" rows="5" required></textarea>
                </label>
                <button class="contact-submit" type="submit">Send Inquiry</button>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>Sin the Kin</p>
        <div class="footer-links">
            <a href="prints.html">Prints</a>
            <a href="originals.html">Original Work</a>
            <a href="meet-sin.html">Meet Sin</a>
            <a href="info.html">Info</a>
        </div>
        <p class="footer-contact">sinthekin@proton.me</p>
    </footer>
</body>

</html>
